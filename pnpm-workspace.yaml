  "@tailwindcss/vite": ^4.2.4
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/user-event": ^14.6.1
  "@total-typescript/tsconfig": ^1.0.4
  "@types/node": ^25.6.0
  "@vitest/coverage-v8": ^4.1.5
  "@vitest/ui": 4.1.5
  bcryptjs: ^3.0.3
