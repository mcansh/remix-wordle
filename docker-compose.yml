version: "3.7"
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=wordle
    ports:
      - "5432:5432"
    volumes:
      - ./.cache/postgres:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    command: redis-server --requirepass redis
    volumes:
      - ./.cache/redis:/data
    ports:
      - "6379:6379"
